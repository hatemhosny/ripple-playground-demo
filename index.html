<!DOCTYPE html>
<html lang="en" class=""><head><script>window.livecodes = window.livecodes || {};</script><title>Ripple playground</title><meta name="title" content="Ripple playground"><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="./style.css"><script src="https://cdn.jsdelivr.net/npm/es-module-shims@1.10.0/dist/es-module-shims.js" async=""></script><script type="importmap">{
  "imports": {
    "ripple": "https://esm.sh/ripple"
  }
}</script></head><body>

	
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Ripple playground</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
        height: 100dvh;
        overflow: hidden;
			}
		</style>

		<script type="module">
			import { createPlayground } from 'https://cdn.jsdelivr.net/npm/livecodes@0.11.1';

			createPlayground('#container', {
				appUrl: 'https://ripple.livecodes.pages.dev',
				config: {
					customSettings: { ripple: { version: '0.2.19' } },
					activeEditor: 'script',
					script: {
						language: 'ripple',
						content: `import type { Component } from "ripple"

export default component App() {
  <div class="container">
    let $count = 0;

    <button onClick={() => $count++}>{$count}</button>

    if ($count > 1) {
      <div>{'Greater than 1!'}</div>
    }
  </div>

  <style>
    button {
      padding: 1rem;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
}
`,
					},
					markup: {
						language: 'html',
						hideTitle: true,
					},
					style: {
						language: 'css',
						hideTitle: true,
						content: `body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; background: hsl(0, 0%, 18%); color: #fff }`,
					},
				},
			});
		</script>
	
	
		<div id="container" data-default-styles="false" data-height="100%"></div>
	

<script src="./script.js"></script></body></html>
